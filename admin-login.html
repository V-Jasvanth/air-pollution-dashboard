<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#1c1c1c,#2c3e50);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:white;
}

.login-box{
  width:320px;
  background:rgba(255,255,255,0.1);
  padding:30px;
  border-radius:20px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:15px;
}

button{
  width:100%;
  padding:10px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#00e676;
  cursor:pointer;
  font-weight:600;
}

.error{
  color:#ff5252;
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Admin Login</h2>
  <input type="password" id="password" placeholder="Enter password">
  <button onclick="login()">Login</button>
  <div class="error" id="errorMsg"></div>
  <br>
  <a href="index.html" style="color:white;">⬅ Back to Dashboard</a>
</div>

<script>
const ADMIN_PASSWORD = "admin123";

function login(){
  const entered = document.getElementById("password").value;

  if(entered === ADMIN_PASSWORD){
    sessionStorage.setItem("adminLoggedIn","true");
    window.location.href="admin.html";
  }else{
    document.getElementById("errorMsg").innerText="Incorrect Password!";
  }
}
</script>

</body>
</html>
